<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parlez-Vous — French Verb Mastery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f3ed;
    --page: #ede8e0;
    --card: #faf8f4;
    --card2: #f2ede4;
    --border: #d4c9b8;
    --border2: #c4b8a4;
    --navy: #1a2d4a;
    --navy2: #243d62;
    --blue: #2e5496;
    --blue2: #3a6ab8;
    --terra: #c05e3a;
    --terra2: #d97050;
    --teal: #2a6b5a;
    --teal2: #348a72;
    --amber: #b07b20;
    --amber2: #d09830;
    --ink: #1a1816;
    --ink2: #3a3630;
    --muted: #7a7060;
    --muted2: #9a9080;
    --past-bg: #e8f2ee;
    --past-border: #2a6b5a;
    --past-text: #1a4035;
    --present-bg: #fff8e8;
    --present-border: #b07b20;
    --present-text: #5a3c08;
    --future-bg: #e8eef8;
    --future-border: #2e5496;
    --future-text: #12274a;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* subtle dot pattern on body */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #b8a88820 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(247,243,237,0.97);
    backdrop-filter: blur(8px);
    z-index: 100;
  }

  .logo {
    font-family: 'Libre Baskerville', serif;
    font-style: italic;
    font-size: 1.45rem;
    color: var(--navy);
    letter-spacing: -0.01em;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .logo-flag {
    font-style: normal;
    font-size: 1.2rem;
  }

  .logo-sub {
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-weight: 500;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid var(--border2);
    border-radius: 4px;
    background: var(--card2);
  }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    max-width: 320px;
    margin: 0 24px;
  }

  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--card2);
    border-radius: 3px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--navy), var(--blue2));
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  .progress-label {
    font-size: 0.75rem;
    color: var(--muted);
    white-space: nowrap;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  .top-actions {
    display: flex;
    gap: 8px;
  }

  .btn-icon {
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--ink2);
    border-radius: 8px;
    padding: 7px 13px;
    font-size: 0.78rem;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s;
    letter-spacing: 0.01em;
  }

  .btn-icon:hover {
    background: var(--card2);
    border-color: var(--border2);
  }

  .btn-icon.active {
    background: var(--navy);
    border-color: var(--navy);
    color: #fff;
  }

  /* MAIN LAYOUT */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px 48px;
    gap: 18px;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* MAIN WORD CARD */
  .word-card {
    width: 100%;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 0;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(26,24,22,0.07), 0 1px 3px rgba(26,24,22,0.05);
  }

  .word-card-header {
    background: var(--navy);
    padding: 28px 36px 24px;
    position: relative;
    overflow: hidden;
  }

  .word-card-header::after {
    content: '';
    position: absolute;
    top: -30px;
    right: -30px;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 40px solid rgba(255,255,255,0.04);
    pointer-events: none;
  }

  .verb-number {
    font-size: 0.68rem;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 12px;
  }

  .verb-main-row {
    display: flex;
    align-items: flex-end;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .verb-word {
    font-family: 'Libre Baskerville', serif;
    font-size: 3.8rem;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    cursor: pointer;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .verb-word:hover { opacity: 0.85; }

  .speak-btn {
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.25);
    border-radius: 50%;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #fff;
    font-size: 0.95rem;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .speak-btn:hover { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.5); }
  .speak-btn.speaking { background: rgba(255,255,255,0.28); animation: pulse 0.6s infinite; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  .verb-translation {
    font-size: 1.1rem;
    color: rgba(255,255,255,0.6);
    font-weight: 300;
    font-style: italic;
    font-family: 'Libre Baskerville', serif;
    padding-bottom: 3px;
  }

  .verb-pron {
    display: inline-block;
    font-size: 0.82rem;
    color: var(--navy);
    background: #e8f0fa;
    border: 1px solid #c0d0e8;
    border-radius: 6px;
    padding: 4px 11px;
    letter-spacing: 0.05em;
    font-weight: 500;
    margin-top: 2px;
  }

  .word-card-body {
    padding: 22px 36px 26px;
  }

  .tips-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .tips-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: #fff8e8;
    border: 1.5px solid #e8d090;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.95rem;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .tips-content {}
  .tips-label {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--amber);
    font-weight: 600;
    margin-bottom: 5px;
  }

  .tips-text {
    font-size: 0.88rem;
    color: var(--ink2);
    line-height: 1.65;
  }

  .card-actions {
    position: absolute;
    top: 22px;
    right: 26px;
    display: flex;
    gap: 8px;
  }

  .bm-btn {
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.75rem;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
    font-weight: 500;
  }

  .bm-btn:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.4); color: #fff; }
  .bm-btn.saved { background: #e8b830; border-color: #e8b830; color: var(--navy); }

  /* TENSE GRID */
  .tense-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    width: 100%;
  }

  @media(max-width: 640px) {
    .tense-grid { grid-template-columns: 1fr; }
    .verb-word { font-size: 2.6rem; }
    .word-card-header { padding: 22px 20px 20px; }
    .word-card-body { padding: 18px 20px 20px; }
  }

  .tense-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(26,24,22,0.04);
  }

  .tense-header {
    padding: 14px 18px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .past   .tense-header { background: var(--past-bg); border-bottom-color: rgba(42,107,90,0.2); }
  .present .tense-header { background: var(--present-bg); border-bottom-color: rgba(176,123,32,0.2); }
  .future  .tense-header { background: var(--future-bg); border-bottom-color: rgba(46,84,150,0.2); }

  .tense-label-group { display: flex; align-items: center; gap: 8px; }

  .tense-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .past .tense-dot   { background: var(--past-border); }
  .present .tense-dot { background: var(--amber); }
  .future .tense-dot  { background: var(--blue); }

  .tense-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .past .tense-label   { color: var(--past-text); }
  .present .tense-label { color: var(--present-text); }
  .future .tense-label  { color: var(--future-text); }

  .tense-french {
    font-size: 0.65rem;
    font-family: 'Libre Baskerville', serif;
    font-style: italic;
  }

  .past .tense-french   { color: var(--teal2); }
  .present .tense-french { color: var(--amber); }
  .future .tense-french  { color: var(--blue2); }

  .tense-speak {
    background: none;
    border: 1px solid;
    border-radius: 6px;
    padding: 4px 9px;
    font-size: 0.7rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
  }

  .past .tense-speak   { border-color: var(--past-border); color: var(--teal); }
  .present .tense-speak { border-color: var(--amber); color: var(--amber); }
  .future .tense-speak  { border-color: var(--blue); color: var(--blue); }

  .past .tense-speak:hover   { background: var(--past-border); color: #fff; }
  .present .tense-speak:hover { background: var(--amber); color: #fff; }
  .future .tense-speak:hover  { background: var(--blue); color: #fff; }

  .tense-body { padding: 16px 18px 14px; }

  .tense-forms {
    font-size: 1.02rem;
    color: var(--ink);
    font-weight: 500;
    line-height: 1.8;
    margin-bottom: 12px;
  }

  .form-entry { display: flex; align-items: baseline; gap: 7px; flex-wrap: wrap; }
  .form-word { font-weight: 600; color: var(--ink); }
  .form-pron {
    font-size: 0.72rem;
    color: var(--muted2);
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: 'Libre Baskerville', serif;
    font-style: italic;
  }

  .tense-example {
    font-size: 0.82rem;
    line-height: 1.6;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
  }

  .tense-example .fr {
    color: var(--ink2);
    font-weight: 500;
    font-family: 'Libre Baskerville', serif;
    font-style: italic;
    margin-bottom: 3px;
  }

  .tense-example .en {
    color: var(--muted);
    font-size: 0.78rem;
    margin-bottom: 8px;
  }

  .ex-speak-btn {
    background: none;
    border: none;
    font-size: 0.72rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    transition: opacity 0.15s;
  }

  .past .ex-speak-btn   { color: var(--teal); }
  .present .ex-speak-btn { color: var(--amber); }
  .future .ex-speak-btn  { color: var(--blue); }
  .ex-speak-btn:hover { opacity: 0.7; }

  /* NAV */
  .nav-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
  }

  .btn-nav {
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--ink2);
    border-radius: 12px;
    padding: 12px 28px;
    font-size: 0.88rem;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 7px;
    box-shadow: 0 1px 3px rgba(26,24,22,0.06);
  }

  .btn-nav:hover { background: var(--card2); border-color: var(--border2); }

  .btn-nav.primary {
    background: var(--navy);
    border-color: var(--navy);
    color: #fff;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  .btn-nav.primary:hover { background: var(--navy2); }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

  /* SEARCH PANEL */
  .search-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,45,74,0.55);
    z-index: 200;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding-top: 80px;
  }

  .search-overlay.open { display: flex; }

  .search-box {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 18px;
    width: 100%;
    max-width: 540px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(26,24,22,0.18);
  }

  .search-input-row {
    display: flex;
    align-items: center;
    padding: 14px 18px;
    gap: 10px;
    border-bottom: 1.5px solid var(--border);
    background: var(--card2);
  }

  .search-icon { color: var(--muted); font-size: 0.95rem; }

  .search-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--ink);
    font-size: 1rem;
    font-family: 'Inter', sans-serif;
    outline: none;
  }

  .search-input::placeholder { color: var(--muted2); }

  .search-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    width: 28px;
    height: 28px;
    font-size: 0.85rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .search-close:hover { background: var(--card); color: var(--ink); }

  .search-results { max-height: 400px; overflow-y: auto; }

  .search-result {
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: background 0.12s;
    border-bottom: 1px solid var(--border);
  }

  .search-result:hover { background: var(--card2); }
  .search-result:last-child { border-bottom: none; }

  .sr-num {
    font-size: 0.68rem;
    color: var(--muted2);
    width: 28px;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }

  .sr-verb {
    font-weight: 700;
    font-size: 1rem;
    color: var(--navy);
    font-family: 'Libre Baskerville', serif;
  }

  .sr-trans { font-size: 0.8rem; color: var(--muted); font-style: italic; }

  /* Card animation */
  .card-enter {
    animation: cardIn 0.32s cubic-bezier(0.34,1.4,0.64,1);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(10px) scale(0.99); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .loading {
    text-align: center;
    padding: 80px;
    color: var(--muted);
    font-size: 1.1rem;
    font-style: italic;
    font-family: 'Libre Baskerville', serif;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--navy);
    color: #fff;
    padding: 10px 22px;
    border-radius: 50px;
    font-size: 0.82rem;
    font-weight: 500;
    z-index: 300;
    transition: transform 0.28s cubic-bezier(.34,1.4,.64,1);
    pointer-events: none;
    letter-spacing: 0.01em;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Autoplay bar */
  .autoplay-bar {
    width: 100%;
    height: 3px;
    background: var(--card2);
    border-radius: 2px;
    overflow: hidden;
    display: none;
    border: 1px solid var(--border);
  }

  .autoplay-bar.active { display: block; }

  .autoplay-fill {
    height: 100%;
    background: var(--navy);
    border-radius: 2px;
    width: 0%;
    transition: width linear;
  }

  /* Quiz */
  .quiz-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,45,74,0.65);
    z-index: 150;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 24px;
  }

  .quiz-overlay.open { display: flex; }

  .quiz-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 36px 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(26,24,22,0.14);
  }

  .quiz-question {
    font-family: 'Libre Baskerville', serif;
    font-size: 3rem;
    color: var(--navy);
    margin-bottom: 8px;
    font-weight: 700;
  }

  .quiz-hint { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; }

  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 18px;
  }

  .quiz-opt {
    background: var(--card2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 13px 10px;
    color: var(--ink);
    cursor: pointer;
    font-size: 0.88rem;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.3;
  }

  .quiz-opt:hover { border-color: var(--navy); color: var(--navy); background: var(--future-bg); }
  .quiz-opt.correct { border-color: var(--teal); background: var(--past-bg); color: var(--teal); }
  .quiz-opt.wrong { border-color: var(--terra); background: #faeee8; color: var(--terra); }
  .quiz-opt:disabled { cursor: not-allowed; }

  .quiz-score { font-size: 0.88rem; color: rgba(255,255,255,0.8); font-weight: 500; }

  .quiz-title {
    font-family: 'Libre Baskerville', serif;
    font-style: italic;
    font-size: 1.4rem;
    color: #fff;
    margin-bottom: 3px;
  }

  .quiz-close {
    position: absolute;
    top: 20px;
    right: 20px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <span class="logo-flag">🇫🇷</span>
    Parlez-Vous
    <span class="logo-sub">194 Verbs</span>
  </div>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-label" id="progressLabel">1 / 194</span>
  </div>
  <div class="top-actions">
    <button class="btn-icon" onclick="toggleSearch()" title="Search verbs">🔍 Search</button>
    <button class="btn-icon" id="autoBtn" onclick="toggleAuto()">▶ Auto</button>
    <button class="btn-icon" onclick="openQuiz()">🎯 Quiz</button>
    <button class="btn-icon" id="bookmarkFilterBtn" onclick="toggleBookmarkFilter()">⭐ Saved</button>
  </div>
</div>

<div class="main">
  <div class="autoplay-bar" id="autoBar"><div class="autoplay-fill" id="autoFill"></div></div>
  <div id="cardArea" class="loading">Chargement des verbes…</div>

  <div class="nav-row">
    <button class="btn-nav" id="prevBtn" onclick="navigate(-1)">← Précédent</button>

// ——————————————————————————————
// TIPS per verb (contextual usage tips)
// ——————————————————————————————
const TIPS = {
  "être": "Used as an auxiliary verb with many verbs of motion and reflexive verbs. \"C'est\" (it is) vs \"Il est\" (he is) — use \"c'est\" before nouns/adjectives with no article.",
  "avoir": "Main auxiliary for most French verbs in compound tenses. Also in many idioms: avoir faim (to be hungry), avoir peur (to be scared), avoir raison (to be right).",
  "aller": "Used to form near future: \"Je vais manger\" (I'm going to eat). Also used in greetings: \"Ça va?\" (How are you?).",
  "faire": "Extremely versatile — faire du sport (to do sport), faire la cuisine (to cook), faire beau (nice weather). Used in causative constructions: faire faire (to have something done).",
  "dire": "Distinguished from 'parler': dire = what you say, parler = the act of speaking. Note: 'vous dites' is irregular (not 'vous disez').",
  "pouvoir": "Expresses ability or permission. In conditional: 'pourrait' = could. Often paired with infinitive: je peux venir (I can come).",
  "vouloir": "Use conditional 'voudrais' for polite requests: 'Je voudrais un café' (I would like a coffee) — much more polite than 'je veux'.",
  "savoir": "Contrasted with 'connaître': savoir = knowing a fact/how to do something; connaître = knowing a person/place/thing.",
  "voir": "Common in expressions: on verra (we'll see), voir venir (wait and see). Also used figuratively: je vois ce que tu veux dire (I see what you mean).",
  "venir": "Forms recent past with 'de': 'Je viens de manger' (I just ate). 'Venir' is used for where you come from; 'aller' for where you're going.",
  "parler": "Use 'parler de' (to talk about) and 'parler à' (to talk to). 'Parler' vs 'dire': parler is the general act, dire focuses on the content.",
  "prendre": "Has many meanings: take a train, take a shower (prendre une douche), take a decision. Also used for eating/drinking: prendre un café.",
  "aimer": "Followed by infinitive for activities: 'J'aime nager'. Followed by noun with article: 'J'aime le chocolat'. 'Aimer' is stronger (love) than 'aimer bien' (like).",
  "passer": "Very versatile: passer un examen (take an exam), passer du temps (spend time), ça se passe (it happens). Also used as an auxiliary with être for 'to pass by'.",
  "penser": "Use 'penser à' (to think about/of someone) vs 'penser de' (to think of = have an opinion). 'Je pense que' introduces an opinion.",
  "attendre": "No preposition needed: 'J'attends le bus' (I'm waiting for the bus). Compare with English 'wait for'.",
  "trouver": "Can mean both 'to find' and 'to think/consider': 'Je trouve ça intéressant' (I find that interesting). Very common in everyday speech.",
  "donner": "Key phrase: 'donner envie' (to make you want to). Also: 'se donner' (to devote oneself). 'Donner sur' means to overlook/face.",
  "laisser": "Distinguish from 'partir' and 'quitter': laisser = leave something/someone behind. Also used causatively: laisser faire (let it happen).",
  "demander": "Use 'demander à quelqu'un de faire' (ask someone to do). 'Se demander' = to wonder. Different from 'poser une question' (to ask a question formally).",
  "travailler": "Used for all types of work. 'Travailler sur' (to work on), 'travailler pour' (to work for). Compare: 'le travail' (work/job), 'un travail' (a job).",
  "manger": "Note the spelling change: nous mangeons (not mangons) to preserve the soft 'g' sound. Common in: manger sur le pouce (eat on the go).",
  "partir": "Vs 'quitter': partir is intransitive (I leave), quitter takes a direct object (I leave Paris / I leave her). Also: à partir de (starting from).",
  "mettre": "Hugely versatile: mettre du temps (to take time), mettre en place (to set up), se mettre à (to start doing). Also used for wearing clothes.",
  "sauter": "Literal and figurative: sauter une étape (skip a step), sauter de joie (jump for joy), sauter aux yeux (be obvious).",
  "rêver": "Used with 'de' for dreaming of something: 'Je rêve de voyager'. Also: 'rêver éveillé' (daydream). 'Tu rêves!' means 'You wish!' or 'No way!'",
  "finir": "Regular -ir verb (model). 'Finir par' + infinitive means 'to end up doing': Il finit par accepter (He ends up accepting).",
  "perdre": "Common expressions: perdre la tête (lose one's mind), perdre du temps (waste time), perdre de vue (lose sight of). Also 'se perdre' = to get lost.",
  "choisir": "Regular -ir verb. 'Choisir entre' (choose between), 'choisir de' + infinitive (choose to do something). Very common in daily decisions.",
  "comprendre": "Distinguished from 'savoir': comprendre is about understanding/grasping, savoir is about factual knowledge. 'Je ne comprends pas' is essential in French!",
  "apprendre": "'Apprendre à' + infinitive = to learn to do: 'J'apprends à cuisiner'. Also means 'to teach' with indirect object: Il m'apprend le français.",
  "boire": "Irregular verb. Common: boire un coup (have a drink), boire à la santé de (drink to). 'Je boirais bien...' is a polite way to say you'd like a drink.",
  "voir": "Common: voir venir (wait and see), loin de voir (far from seeing). 'Voyons!' is an interjection meaning 'Come on!' or 'Let me think...'",
  "vivre": "Vs 'habiter': vivre is broader (to live/be alive), habiter is specifically where you reside. 'Vivre de' = to live on/off something.",
  "venir": "'D'où viens-tu?' (Where are you from?) is very common. 'En venir à' = to get around to. 'Ça vient!' = It's coming! (be patient).",
};

// State
let currentIndex = 0;
let bookmarks = JSON.parse(localStorage.getItem('frBookmarks') || '[]');
let showBookmarksOnly = false;
let displayList = [...VERBS.keys()].map((i, _) => i);
let autoInterval = null;
let autoRunning = false;
let quizScore = { correct: 0, total: 0 };
let quizAnswer = '';

function getDisplayList() {
  if (showBookmarksOnly) {
    return VERBS.map((v, i) => i).filter(i => bookmarks.includes(VERBS[i].verb));
  }
  return VERBS.map((_, i) => i);
}

function currentVerb() {
  const list = getDisplayList();
  return VERBS[list[currentIndex]] || VERBS[0];
}

function speakText(text, lang = 'fr-FR') {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = lang;
  utt.rate = 0.85;
  utt.pitch = 1;
  window.speechSynthesis.speak(utt);
}

function speakCurrent() {
  const v = currentVerb();
  speakText(v.verb);
  document.querySelectorAll('.speak-btn').forEach(b => b.classList.add('speaking'));
  setTimeout(() => document.querySelectorAll('.speak-btn').forEach(b => b.classList.remove('speaking')), 1200);
}

function speakTense(tense) {
  const v = currentVerb();
  const forms = v[tense].forms.replace(/\[.*?\]/g, '').replace(/\//g, ',');
  speakText(forms);
}

function speakExample(tense) {
  const v = currentVerb();
  const ex = v[tense].example;
  const frPart = ex.split('(')[0].trim();
  speakText(frPart);
}

function renderTenseForms(forms) {
  const parts = forms.split('/').map(s => s.trim());
  return parts.map(part => {
    const match = part.match(/^([^\[]+)(\[.*?\])?(.*)$/);
    if (match) {
      const word = match[1].trim();
      const pron = match[2] ? match[2] : '';
      return `<div class="form-entry"><span class="form-word">${word}</span>${pron ? `<span class="form-pron">${pron}</span>` : ''}</div>`;
    }
    return `<div class="form-entry"><span class="form-word">${part}</span></div>`;
  }).join('');
}

function renderExample(example) {
  const match = example.match(/^(.*?)\((.*?)\)$/);
  if (match) {
    return `<div class="fr">${match[1].trim()}</div><div class="en">(${match[2].trim()})</div>`;
  }
  return `<div class="fr">${example}</div>`;
}

  const list = getDisplayList();

    document.getElementById('cardArea').innerHTML = `<div style="text-align:center;color:var(--muted);padding:60px">No saved verbs yet. Star some verbs to see them here!</div>`;

  const idx = list[currentIndex];
  const v = VERBS[idx];

  const html = `

          </div>
          <button class="tense-speak" onclick="speakTense('future')">🔊 Écouter</button>
        </div>
        <div class="tense-body">
          <div class="tense-forms">${renderTenseForms(v.future.forms)}</div>
          <div class="tense-example">
            ${renderExample(v.future.example)}
            <button class="ex-speak-btn" onclick="speakExample('future')">🔊 Entendre l'exemple</button>
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('cardArea').innerHTML = html;
  updateProgress(list);
  document.getElementById('prevBtn').disabled = currentIndex === 0;
  document.getElementById('nextBtn').disabled = currentIndex === list.length - 1;
}

function updateProgress(list) {
  const pct = ((currentIndex + 1) / list.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${currentIndex + 1} / ${list.length}`;
}

function navigate(dir) {
  const list = getDisplayList();
  const newIdx = currentIndex + dir;
  if (newIdx < 0 || newIdx >= list.length) return;
  currentIndex = newIdx;
  render();
}

function toggleBookmark() {
  const v = currentVerb();
  if (bookmarks.includes(v.verb)) {
    bookmarks = bookmarks.filter(b => b !== v.verb);
    showToast('Removed from saved');
  } else {
    bookmarks.push(v.verb);
    showToast('Saved! ⭐');
  }
  localStorage.setItem('frBookmarks', JSON.stringify(bookmarks));
  render();
}

function toggleBookmarkFilter() {
  showBookmarksOnly = !showBookmarksOnly;
  currentIndex = 0;
  document.getElementById('bookmarkFilterBtn').classList.toggle('active', showBookmarksOnly);
  render();
}

// SEARCH
function toggleSearch() {
  const overlay = document.getElementById('searchOverlay');
  overlay.classList.toggle('open');
  if (overlay.classList.contains('open')) {
    document.getElementById('searchInput').value = '';
    filterSearch();
    setTimeout(() => document.getElementById('searchInput').focus(), 100);
  }
}

function filterSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const results = document.getElementById('searchResults');
  const filtered = VERBS.filter(v =>
    v.verb.toLowerCase().includes(q) ||
    v.translation.toLowerCase().includes(q)
  ).slice(0, 30);

  results.innerHTML = filtered.map((v, i) => {
    const globalIdx = VERBS.indexOf(v);
    return `<div class="search-result" onclick="goToVerb(${globalIdx})">
      <span class="sr-num">${globalIdx + 1}</span>
      <div>
        <div class="sr-verb">${v.verb}</div>
        <div class="sr-trans">${v.translation}</div>
      </div>
    </div>`;
  }).join('');
}

function goToVerb(globalIdx) {
  showBookmarksOnly = false;
  document.getElementById('bookmarkFilterBtn').classList.remove('active');
  const list = getDisplayList();
  currentIndex = list.indexOf(globalIdx);
  if (currentIndex < 0) currentIndex = 0;
  toggleSearch();
  render();
}

// AUTOPLAY
function toggleAuto() {
  autoRunning = !autoRunning;
  const btn = document.getElementById('autoBtn');
  const bar = document.getElementById('autoBar');

  if (autoRunning) {
    btn.textContent = '⏸ Auto';
    btn.classList.add('active');
    bar.classList.add('active');
    runAutoStep();
  } else {
    btn.textContent = '▶ Auto';
    btn.classList.remove('active');
    bar.classList.remove('active');
    if (autoInterval) clearTimeout(autoInterval);
  }
}

function runAutoStep() {
  if (!autoRunning) return;
  const v = currentVerb();
  speakText(v.verb);

  const fill = document.getElementById('autoFill');
  fill.style.transition = 'none';
  fill.style.width = '0%';
  setTimeout(() => {
    fill.style.transition = 'width 4s linear';
    fill.style.width = '100%';
  }, 50);

  autoInterval = setTimeout(() => {
    const list = getDisplayList();
    if (currentIndex < list.length - 1) {
      currentIndex++;
      render();
      runAutoStep();
    } else {
      toggleAuto();
    }
  }, 4000);
}

// QUIZ
let quizVerbIdx = -1;

function openQuiz() {
  document.getElementById('quizOverlay').classList.add('open');
  quizScore = { correct: 0, total: 0 };
  updateQuizScore();
  nextQuiz();
}

function closeQuiz() {
  document.getElementById('quizOverlay').classList.remove('open');
}

function updateQuizScore() {
  document.getElementById('quizScore').textContent = `Score: ${quizScore.correct} / ${quizScore.total}`;
}

function nextQuiz() {
  document.getElementById('quizNextBtn').style.display = 'none';
  // Pick random verb
  quizVerbIdx = Math.floor(Math.random() * VERBS.length);
  const v = VERBS[quizVerbIdx];
  quizAnswer = v.translation;

  document.getElementById('quizQ').textContent = v.verb;
  document.getElementById('quizHint').textContent = 'What does this verb mean in English?';

  // Wrong answers
  const allTranslations = VERBS.map(vb => vb.translation).filter(t => t !== v.translation);
  const shuffled = allTranslations.sort(() => Math.random() - 0.5).slice(0, 3);
  const options = [...shuffled, v.translation].sort(() => Math.random() - 0.5);

  document.getElementById('quizOpts').innerHTML = options.map(opt => `
    <button class="quiz-opt" onclick="checkQuiz(this, '${opt.replace(/'/g, "\\'")}')">
      ${opt}
    </button>
  `).join('');
}

function checkQuiz(btn, answer) {
  const isCorrect = answer === quizAnswer;
  quizScore.total++;
  if (isCorrect) {
    quizScore.correct++;
    btn.classList.add('correct');
    speakText(VERBS[quizVerbIdx].verb);
  } else {
    btn.classList.add('wrong');
    // Show correct
    document.querySelectorAll('.quiz-opt').forEach(b => {
      if (b.textContent.trim() === quizAnswer) b.classList.add('correct');
    });
  }
  document.querySelectorAll('.quiz-opt').forEach(b => b.disabled = true);
  updateQuizScore();
  document.getElementById('quizNextBtn').style.display = 'flex';
}

// TOAST
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// KEYBOARD
document.addEventListener('keydown', e => {
  if (document.getElementById('searchOverlay').classList.contains('open')) return;
  if (document.getElementById('quizOverlay').classList.contains('open')) return;
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === ' ') { e.preventDefault(); speakCurrent(); }
  if (e.key === 'f' || e.key === 'F') toggleSearch();
  if (e.key === 'b' || e.key === 'B') toggleBookmark();
});

// Close search on escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('searchOverlay').classList.remove('open');
    document.getElementById('quizOverlay').classList.remove('open');
  }
});

// Init
render();
</script>
