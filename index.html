const TIPS = {
  "être": "Used as an auxiliary verb with many verbs of motion and reflexive verbs. \"C'est\" (it is) vs \"Il est\" (he is) — use \"c'est\" before nouns/adjectives with no article.",
  "avoir": "Main auxiliary for most French verbs in compound tenses. Also in many idioms: avoir faim (to be hungry), avoir peur (to be scared), avoir raison (to be right).",
  "aller": "Used to form near future: \"Je vais manger\" (I'm going to eat). Also used in greetings: \"Ça va?\" (How are you?).",
  "faire": "Extremely versatile — faire du sport (to do sport), faire la cuisine (to cook), faire beau (nice weather). Used in causative constructions: faire faire (to have something done).",
  "dire": "Distinguished from 'parler': dire = what you say, parler = the act of speaking. Note: 'vous dites' is irregular (not 'vous disez').",
  "pouvoir": "Expresses ability or permission. In conditional: 'pourrait' = could. Often paired with infinitive: je peux venir (I can come).",
  "vouloir": "Use conditional 'voudrais' for polite requests: 'Je voudrais un café' (I would like a coffee) — much more polite than 'je veux'.",
  "savoir": "Contrasted with 'connaître': savoir = knowing a fact/how to do something; connaître = knowing a person/place/thing.",
  "voir": "Common in expressions: on verra (we'll see), voir venir (wait and see). Also used figuratively: je vois ce que tu veux dire (I see what you mean).",
  "venir": "Forms recent past with 'de': 'Je viens de manger' (I just ate). 'Venir' is used for where you come from; 'aller' for where you're going.",
  "parler": "Use 'parler de' (to talk about) and 'parler à' (to talk to). 'Parler' vs 'dire': parler is the general act, dire focuses on the content.",
  "prendre": "Has many meanings: take a train, take a shower (prendre une douche), take a decision. Also used for eating/drinking: prendre un café.",
  "aimer": "Followed by infinitive for activities: 'J'aime nager'. Followed by noun with article: 'J'aime le chocolat'. 'Aimer' is stronger (love) than 'aimer bien' (like).",
  "passer": "Very versatile: passer un examen (take an exam), passer du temps (spend time), ça se passe (it happens). Also used as an auxiliary with être for 'to pass by'.",
  "penser": "Use 'penser à' (to think about/of someone) vs 'penser de' (to think of = have an opinion). 'Je pense que' introduces an opinion.",
  "attendre": "No preposition needed: 'J'attends le bus' (I'm waiting for the bus). Compare with English 'wait for'.",
  "trouver": "Can mean both 'to find' and 'to think/consider': 'Je trouve ça intéressant' (I find that interesting). Very common in everyday speech.",
  "donner": "Key phrase: 'donner envie' (to make you want to). Also: 'se donner' (to devote oneself). 'Donner sur' means to overlook/face.",
  "laisser": "Distinguish from 'partir' and 'quitter': laisser = leave something/someone behind. Also used causatively: laisser faire (let it happen).",
  "demander": "Use 'demander à quelqu'un de faire' (ask someone to do). 'Se demander' = to wonder. Different from 'poser une question' (to ask a question formally).",
  "travailler": "Used for all types of work. 'Travailler sur' (to work on), 'travailler pour' (to work for). Compare: 'le travail' (work/job), 'un travail' (a job).",
  "manger": "Note the spelling change: nous mangeons (not mangons) to preserve the soft 'g' sound. Common in: manger sur le pouce (eat on the go).",
  "partir": "Vs 'quitter': partir is intransitive (I leave), quitter takes a direct object (I leave Paris / I leave her). Also: à partir de (starting from).",
  "mettre": "Hugely versatile: mettre du temps (to take time), mettre en place (to set up), se mettre à (to start doing). Also used for wearing clothes.",
  "sauter": "Literal and figurative: sauter une étape (skip a step), sauter de joie (jump for joy), sauter aux yeux (be obvious).",
  "rêver": "Used with 'de' for dreaming of something: 'Je rêve de voyager'. Also: 'rêver éveillé' (daydream). 'Tu rêves!' means 'You wish!' or 'No way!'",
  "finir": "Regular -ir verb (model). 'Finir par' + infinitive means 'to end up doing': Il finit par accepter (He ends up accepting).",
  "perdre": "Common expressions: perdre la tête (lose one's mind), perdre du temps (waste time), perdre de vue (lose sight of). Also 'se perdre' = to get lost.",
  "choisir": "Regular -ir verb. 'Choisir entre' (choose between), 'choisir de' + infinitive (choose to do something). Very common in daily decisions.",
  "comprendre": "Distinguished from 'savoir': comprendre is about understanding/grasping, savoir is about factual knowledge. 'Je ne comprends pas' is essential in French!",
  "apprendre": "'Apprendre à' + infinitive = to learn to do: 'J'apprends à cuisiner'. Also means 'to teach' with indirect object: Il m'apprend le français.",
  "boire": "Irregular verb. Common: boire un coup (have a drink), boire à la santé de (drink to). 'Je boirais bien...' is a polite way to say you'd like a drink.",
  "voir": "Common: voir venir (wait and see), loin de voir (far from seeing). 'Voyons!' is an interjection meaning 'Come on!' or 'Let me think...'",
  "vivre": "Vs 'habiter': vivre is broader (to live/be alive), habiter is specifically where you reside. 'Vivre de' = to live on/off something.",
  "venir": "'D'où viens-tu?' (Where are you from?) is very common. 'En venir à' = to get around to. 'Ça vient!' = It's coming! (be patient).",
};

// State
let currentIndex = 0;
// bookmarks already declared above as object {verbes:[], expr:[], ...}
let displayList = [...VERBS.keys()].map((i, _) => i);
// autoInterval, autoRunning, quizScore declared in main script above
let quizAnswer = '';

function getDisplayList() {
  if (showBookmarksOnly) {
    return VERBS.map((v, i) => i).filter(i => bookmarks.verbes.includes(VERBS[i].verb));
  }
  return VERBS.map((_, i) => i);
}

function currentVerb() {
  const list = getDisplayList();
  return VERBS[list[currentIndex]] || VERBS[0];
}

function speakText(text, lang = 'fr-FR') {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = lang;
  utt.rate = 0.85;
  utt.pitch = 1;
  window.speechSynthesis.speak(utt);
}

function speakCurrent() {
  const v = currentVerb();
  speakText(v.verb);
  document.querySelectorAll('.speak-btn').forEach(b => b.classList.add('speaking'));
  setTimeout(() => document.querySelectorAll('.speak-btn').forEach(b => b.classList.remove('speaking')), 1200);
}

function speakTense(tense) {
  const v = currentVerb();
  const forms = v[tense].forms.replace(/\[.*?\]/g, '').replace(/\//g, ',');
  speakText(forms);
}

function speakExample(tense) {
  const v = currentVerb();
  const ex = v[tense].example;
  const frPart = ex.split('(')[0].trim();
  speakText(frPart);
}

function renderTenseForms(forms) {
  // Parse forms like "était [ay-TEH] / a été [ah ay-TAY]"
  const parts = forms.split('/').map(s => s.trim());
  return parts.map(part => {
    const match = part.match(/^([^\[]+)(\[.*?\])?(.*)$/);
    if (match) {
      const word = match[1].trim();
      const pron = match[2] ? match[2] : '';
      return `<div class="form-entry"><span class="form-word">${word}</span>${pron ? `<span class="form-pron">${pron}</span>` : ''}</div>`;
    }
    return `<div class="form-entry"><span class="form-word">${part}</span></div>`;
  }).join('');
}

function renderExample(example) {
  const match = example.match(/^(.*?)\((.*?)\)$/);
  if (match) {
    return `<div class="fr">${match[1].trim()}</div><div class="en">(${match[2].trim()})</div>`;
  }
  return `<div class="fr">${example}</div>`;
}

function render() {
  const list = getDisplayList();
  if (list.length === 0) {
    document.getElementById('cardArea').innerHTML = `<div style="text-align:center;color:var(--muted);padding:60px">No saved verbs yet. Star some verbs to see them here!</div>`;
    return;
  }
  if (currentIndex >= list.length) currentIndex = 0;

  const idx = list[currentIndex];
  const v = VERBS[idx];
  const tip = TIPS[v.verb] || `Use "${v.verb}" naturally in everyday conversation to master it. Pay attention to how native speakers use it in context.`;
  const isBm = bookmarks.verbes.includes(v.verb);

  const html = `
    <div class="word-card card-enter">
      <div class="word-card-header wch-navy">
        <div class="card-num">Verbe ${idx + 1} / ${VERBS.length} &nbsp;·&nbsp; ${currentIndex + 1} / ${list.length}</div>
        <div class="card-actions">
          <button class="bm-btn ${isBm ? 'saved' : ''}" onclick="toggleBookmark()">
            ${isBm ? '⭐ Sauvegardé' : '☆ Sauvegarder'}
          </button>
        </div>
        <div class="card-main-row">
          <div class="card-word" onclick="speakCurrent()">
            ${v.verb}
            <button class="speak-btn" onclick="speakCurrent(); event.stopPropagation();">🔊</button>
          </div>
          <div class="card-sub">${v.translation}</div>
        </div>
        <div class="card-pron">[ ${v.pronunciation} ]</div>
      </div>
      <div class="word-card-body">
        <div class="tips-row">
          <div class="tips-icon">💡</div>
          <div>
            <div class="tips-label">Conseil d'utilisation</div>
            <div class="tips-text">${tip}</div>
          </div>
        </div>
      </div>
    </div>

    <div class="tense-grid">
      <div class="tense-card past">
        <div class="tense-header">
          <div class="tense-label-group">
            <div class="tense-dot"></div>
            <span class="tense-label">Passé</span>
            <span class="tense-french">Past</span>
          </div>
          <button class="tense-speak" onclick="speakTense('past')">🔊 Écouter</button>
        </div>
        <div class="tense-body">
          <div class="tense-forms">${renderTenseForms(v.past.forms)}</div>
          <div class="tense-example">
            ${renderExample(v.past.example)}
            <button class="ex-speak-btn" onclick="speakExample('past')">🔊 Entendre l'exemple</button>
          </div>
        </div>
      </div>

      <div class="tense-card present">
        <div class="tense-header">
          <div class="tense-label-group">
            <div class="tense-dot"></div>
            <span class="tense-label">Présent</span>
            <span class="tense-french">Present</span>
          </div>
          <button class="tense-speak" onclick="speakTense('present')">🔊 Écouter</button>
        </div>
        <div class="tense-body">
          <div class="tense-forms">${renderTenseForms(v.present.forms)}</div>
          <div class="tense-example">
            ${renderExample(v.present.example)}
            <button class="ex-speak-btn" onclick="speakExample('present')">🔊 Entendre l'exemple</button>
          </div>
        </div>
      </div>

      <div class="tense-card future">
        <div class="tense-header">
          <div class="tense-label-group">
            <div class="tense-dot"></div>
            <span class="tense-label">Futur</span>
            <span class="tense-french">Future</span>
          </div>
          <button class="tense-speak" onclick="speakTense('future')">🔊 Écouter</button>
        </div>
        <div class="tense-body">
          <div class="tense-forms">${renderTenseForms(v.future.forms)}</div>
          <div class="tense-example">
            ${renderExample(v.future.example)}
            <button class="ex-speak-btn" onclick="speakExample('future')">🔊 Entendre l'exemple</button>
          </div>
        </div>
      </div>
    </div>
  `
  document.getElementById('cardArea').innerHTML = html;
  updateProgress(list);
  document.getElementById('prevBtn').disabled = currentIndex === 0;
  document.getElementById('nextBtn').disabled = currentIndex === list.length - 1;
}

function updateProgress(list) {
  const pct = ((currentIndex + 1) / list.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${currentIndex + 1} / ${list.length}`;
}

function navigate(dir) {
  const list = getDisplayList();
  const newIdx = currentIndex + dir;
  if (newIdx < 0 || newIdx >= list.length) return;
  currentIndex = newIdx;
  render();
}

function toggleBookmark() {
  const v = currentVerb();
  if (bookmarks.verbes.includes(v.verb)) {
    bookmarks = bookmarks.verbes.filter(b => b !== v.verb);
    showToast('Removed from saved');
  } else {
    bookmarks.verbes.push(v.verb);
    showToast('Saved! ⭐');
  }
  saveBookmarks();
  render();
}


// SEARCH


function goToVerb(globalIdx) {
  showBookmarksOnly = false;
  document.getElementById('bookmarkFilterBtn').classList.remove('active');
  const list = getDisplayList();
  currentIndex = list.indexOf(globalIdx);
  if (currentIndex < 0) currentIndex = 0;
  toggleSearch();
  render();
}

render();
</script>
